<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetici Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6;
    --accent: #c8400a; --accent2: #f0a500; --text: #1a1208;
    --muted: #8a7e6e; --success: #2d7a50; --danger: #c8400a;
    --border: #e0d9cc; --critical-bg: #fff4f0; --critical-border: #f9c5b0;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0; }
  .topbar { background: var(--text); color: #f7f5f0; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .topbar-title span { color: var(--accent2); }
  .topbar-time { font-size: 13px; color: #aaa; font-family: 'Syne', sans-serif; }
  .main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 40px; }
  .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 12px; padding: 6px; margin-bottom: 32px; width: fit-content; }
  .tab { padding: 10px 22px; border-radius: 8px; border: none; background: transparent; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; color: var(--muted); transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  .section-label { font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .card.critical { background: var(--critical-bg); border-color: var(--critical-border); border-left: 4px solid var(--danger); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .card-date { font-size: 12px; color: var(--muted); }
  .card-body { font-size: 14px; color: #444; line-height: 1.6; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; margin-top: 12px; }
  .tag-danger { background: rgba(200,64,10,0.12); color: var(--danger); }
  .tag-success { background: rgba(45,122,80,0.12); color: var(--success); }
  .tag-warning { background: rgba(240,165,0,0.15); color: #a06000; }
  .score-bar { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .score-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; background: var(--accent2); }
  .score-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; min-width: 32px; text-align: right; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 16px; }
  .summary-meta { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .meta-item { text-align: center; }
  .meta-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); }
  .meta-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .summary-text { font-size: 14px; line-height: 1.7; color: #555; border-top: 1px solid var(--border); padding-top: 16px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .loading { color: var(--muted); font-size: 14px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🍽 Restoran <span>Değerlendirme</span> Sistemi</div>
  <div class="topbar-time" id="clock"></div>
</div>

<div class="main">
  <div class="page-title">Yönetici Paneli</div>
  <p class="page-sub">Günlük raporlar, AI analizleri ve kritik uyarıları buradan takip edin.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('summary')">📊 Günlük Rapor</button>
    <button class="tab" onclick="switchTab('analyzed')">🤖 AI Analizleri</button>
    <button class="tab" onclick="switchTab('critical')">🔴 Kritik Uyarılar</button>
  </div>

  <div class="tab-pane active" id="pane-summary">
    <div class="section-label">Son Günlük Raporlar</div>
    <div id="summary-content" class="loading">⏳ Yükleniyor...</div>
  </div>

  <div class="tab-pane" id="pane-analyzed">
    <div class="section-label">AI Analiz Sonuçları</div>
    <div id="analyzed-content" class="loading">⏳ Yükleniyor...</div>
  </div>

  <div class="tab-pane" id="pane-critical">
    <div class="section-label">Kritik Geri Bildirimler</div>
    <div id="critical-content" class="loading">⏳ Yükleniyor...</div>
  </div>
</div>

<script>
  function updateClock() {
    document.getElementById("clock").textContent = new Date().toLocaleString("tr-TR");
  }
  setInterval(updateClock, 1000);
  updateClock();

  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("active", ["summary","analyzed","critical"][i] === tab);
    });
    document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
    document.getElementById("pane-" + tab).classList.add("active");
  }

  function renderEmpty(el) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>Henüz veri yok.</div></div>';
  }

  // Günlük Rapor
  google.script.run
    .withSuccessHandler(function(data) {
      const el = document.getElementById("summary-content");
      if (!data.rows || data.rows.length === 0) return renderEmpty(el);
      el.innerHTML = data.rows.map(r => `
        <div class="summary-card">
          <div class="card-header">
            <div class="card-name">${r["Tarih"] || "—"}</div>
            <span class="tag tag-success">Günlük Rapor</span>
          </div>
          <div class="summary-meta">
            <div class="meta-item"><div class="meta-value">${r["Toplam Yanıt"] || 0}</div><div class="meta-label">Toplam Yanıt</div></div>
            <div class="meta-item"><div class="meta-value">${r["Ortalama Puan"] || "—"}</div><div class="meta-label">Ort. Puan</div></div>
            <div class="meta-item"><div class="meta-value" style="color:var(--danger)">${r["Kritik Sayısı"] || 0}</div><div class="meta-label">Kritik Uyarı</div></div>
          </div>
          <div class="summary-text">${r["Özet"] || "Özet bilgisi bulunamadı."}</div>
        </div>
      `).join("");
    })
    .withFailureHandler(function() {
      document.getElementById("summary-content").innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>Veri yüklenemedi.</div></div>';
    })
    .getDailySummary();

  // AI Analizler
  google.script.run
    .withSuccessHandler(function(data) {
      const el = document.getElementById("analyzed-content");
      if (!data.rows || data.rows.length === 0) return renderEmpty(el);
      el.innerHTML = '<div class="card-grid">' + data.rows.map(r => {
        const score = parseFloat(r["Puan"]) || 0;
        const pct = (score / 10) * 100;
        const tagClass = score >= 7 ? "tag-success" : score >= 4 ? "tag-warning" : "tag-danger";
        return `
          <div class="card">
            <div class="card-header">
              <div class="card-name">${r["Müşteri Adı"] || "Bilinmiyor"}</div>
              <div class="card-date">${r["Tarih"] || ""}</div>
            </div>
            <div class="card-body">
              <div>${r["Analiz Özeti"] || "—"}</div>
              <div class="score-bar">
                <div class="score-track"><div class="score-fill" style="width:${pct}%"></div></div>
                <div class="score-val">${score}/10</div>
              </div>
            </div>
            <span class="tag ${tagClass}">${r["Duygu"] || "—"}</span>
          </div>`;
      }).join("") + '</div>';
    })
    .withFailureHandler(function() {
      document.getElementById("analyzed-content").innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>Veri yüklenemedi.</div></div>';
    })
    .getAnalyzedFeedback();

  // Kritik Uyarılar
  google.script.run
    .withSuccessHandler(function(data) {
      const el = document.getElementById("critical-content");
      if (!data.rows || data.rows.length === 0) return renderEmpty(el);
      el.innerHTML = '<div class="card-grid">' + data.rows.map(r => `
        <div class="card critical">
          <div class="card-header">
            <div class="card-name">${r["Müşteri Adı"] || "Bilinmiyor"}</div>
            <div class="card-date">${r["Tarih"] || ""}</div>
          </div>
          <div class="card-body">
            <div>${r["Sorun"] || "—"}</div>
            <div style="margin-top:10px;font-size:13px">📧 ${r["Email"] || "—"} &nbsp;|&nbsp; Puan: <strong>${r["Puan"] || "—"}</strong></div>
          </div>
          <span class="tag tag-danger">⚠ Aciliyet: ${r["Aciliyet"] || "Belirtilmemiş"}</span>
        </div>`
      ).join("") + '</div>';
    })
    .withFailureHandler(function() {
      document.getElementById("critical-content").innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>Veri yüklenemedi.</div></div>';
    })
    .getCriticalFeedback();
</script>
</body>
</html>
